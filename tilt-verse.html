<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Tilt-Verse</title>
<style>
  :root { --glow:#ff66cc; --accent:#ff00ff; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif; }
  canvas { position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #hud { position:fixed; top:env(safe-area-inset-top,16px); left:0; right:0; text-align:center; pointer-events:none; z-index:10;
         font-size:11px; letter-spacing:.3em; text-transform:uppercase; opacity:.7; transition:opacity .6s; mix-blend-mode:screen; }
  #hud b { display:block; font-size:22px; letter-spacing:.15em; margin-top:4px; color:var(--glow); text-shadow:0 0 16px var(--glow); font-weight:600; }
  #hud.fade { opacity:0; }
  #hint { position:fixed; bottom:env(safe-area-inset-bottom,20px); left:0; right:0; text-align:center; font-size:11px; letter-spacing:.25em;
          text-transform:uppercase; opacity:.35; pointer-events:none; z-index:10; mix-blend-mode:screen; transition:opacity .6s; }
  #hint.fade { opacity:0; }
  #gate { position:fixed; inset:0; background:#000; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center;
          gap:28px; padding:24px; text-align:center; }
  #gate h1 { font-size:36px; letter-spacing:.25em; font-weight:300; background:linear-gradient(90deg,#ff00ff,#00ffff); -webkit-background-clip:text;
             background-clip:text; color:transparent; text-shadow:0 0 40px rgba(255,0,255,.3); }
  #gate p { max-width:320px; font-size:13px; line-height:1.6; opacity:.65; letter-spacing:.05em; }
  #gate button { margin-top:8px; background:transparent; border:1px solid rgba(255,255,255,.35); color:#fff; font:inherit;
                 padding:14px 38px; letter-spacing:.3em; text-transform:uppercase; font-size:12px; border-radius:999px;
                 cursor:pointer; transition:all .25s; backdrop-filter:blur(10px); }
  #gate button:active { transform:scale(.96); background:rgba(255,255,255,.08); border-color:var(--glow); color:var(--glow); box-shadow:0 0 40px var(--glow); }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:20; transition:opacity .4s; mix-blend-mode:overlay; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><span>Theme</span><b id="themeName">—</b></div>
<div id="hint">Tilt · Shake · Tap</div>
<div id="flash"></div>

<div id="gate">
  <h1>TILT&middot;VERSE</h1>
  <p>Move your phone to explore. Shake to shift realities. Tap anywhere for a pulse.</p>
  <button id="start">Enter</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha:false });
  const hud = document.getElementById('hud');
  const themeNameEl = document.getElementById('themeName');
  const hint = document.getElementById('hint');
  const flash = document.getElementById('flash');
  const gate = document.getElementById('gate');
  const startBtn = document.getElementById('start');

  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const themes = [
    { name:'Nebula',  bgA:'#1a0033', bgB:'#4a0080', stars:'#ffffff', accent:'#ff00ff', glow:'#ff66cc' },
    { name:'Aurora',  bgA:'#001a2e', bgB:'#003d5c', stars:'#e0ffff', accent:'#00ffaa', glow:'#66ffcc' },
    { name:'Ember',   bgA:'#1a0000', bgB:'#4d1500', stars:'#ffcc99', accent:'#ff6600', glow:'#ffaa33' },
    { name:'Ocean',   bgA:'#001024', bgB:'#003d66', stars:'#ccffff', accent:'#00aaff', glow:'#66ccff' },
    { name:'Void',    bgA:'#050505', bgB:'#1a1a1a', stars:'#ffffff', accent:'#ff0044', glow:'#ff6688' },
    { name:'Forest',  bgA:'#001a0d', bgB:'#003d1f', stars:'#ccffdd', accent:'#00ff66', glow:'#66ff99' },
    { name:'Sunset',  bgA:'#2e0011', bgB:'#801a33', stars:'#ffddaa', accent:'#ff3366', glow:'#ff99aa' },
    { name:'Mono',    bgA:'#000000', bgB:'#222222', stars:'#ffffff', accent:'#ffffff', glow:'#cccccc' },
  ];
  let themeIdx = Math.floor(Math.random() * themes.length);
  let theme = themes[themeIdx];

  const setCssTheme = t => {
    document.documentElement.style.setProperty('--glow', t.glow);
    document.documentElement.style.setProperty('--accent', t.accent);
    themeNameEl.textContent = t.name;
  };
  setCssTheme(theme);

  // World layers of stars + nebula blobs
  const starsFar = [], starsMid = [], starsNear = [];
  function seedStars() {
    starsFar.length = starsMid.length = starsNear.length = 0;
    const area = Math.max(W, H);
    for (let i = 0; i < 180; i++) starsFar.push({  x:Math.random()*2-1, y:Math.random()*2-1, s:Math.random()*0.8+0.2, tw:Math.random()*Math.PI*2 });
    for (let i = 0; i < 90;  i++) starsMid.push({  x:Math.random()*2-1, y:Math.random()*2-1, s:Math.random()*1.4+0.6, tw:Math.random()*Math.PI*2 });
    for (let i = 0; i < 40;  i++) starsNear.push({ x:Math.random()*2-1, y:Math.random()*2-1, s:Math.random()*2.2+1.2, tw:Math.random()*Math.PI*2 });
  }
  seedStars();

  // Nebula blobs drift
  const blobs = [];
  function seedBlobs() {
    blobs.length = 0;
    for (let i = 0; i < 5; i++) {
      blobs.push({
        x: Math.random()*2-1,
        y: Math.random()*2-1,
        r: 0.25 + Math.random()*0.35,
        vx: (Math.random()-.5)*0.00006,
        vy: (Math.random()-.5)*0.00006,
        hueShift: Math.random()
      });
    }
  }
  seedBlobs();

  // Ripples from taps
  const ripples = [];
  function addRipple(x, y) {
    ripples.push({ x, y, r:0, a:1, born:performance.now() });
  }

  // Orb particles swirling around center
  const particles = [];
  for (let i = 0; i < 60; i++) {
    particles.push({
      a: Math.random()*Math.PI*2,
      r: 40 + Math.random()*120,
      sp: 0.0008 + Math.random()*0.002,
      size: Math.random()*1.6 + 0.4,
      tw: Math.random()*Math.PI*2
    });
  }

  // Tilt state (tx,ty in -1..1). Smoothed.
  let tx = 0, ty = 0, tgtX = 0, tgtY = 0;
  let shakeBoost = 0;
  let usingMotion = false;
  let lastInputAt = performance.now();
  let autopilot = true; // auto-demo until real input arrives

  // Fallback: drag with finger when no gyroscope
  let dragging = false, dragStartX = 0, dragStartY = 0, dragBaseX = 0, dragBaseY = 0;
  canvas.addEventListener('pointerdown', e => {
    dragging = true;
    autopilot = false; lastInputAt = performance.now();
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragBaseX = tgtX; dragBaseY = tgtY;
    addRipple(e.clientX, e.clientY);
    pulseHaptic(12);
    shakeBoost = Math.max(shakeBoost, 0.6);
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    autopilot = false; lastInputAt = performance.now();
    const dx = (e.clientX - dragStartX) / (W*0.5);
    const dy = (e.clientY - dragStartY) / (H*0.5);
    tgtX = Math.max(-1, Math.min(1, dragBaseX + dx));
    tgtY = Math.max(-1, Math.min(1, dragBaseY + dy));
  });
  canvas.addEventListener('pointerup',   () => dragging = false);
  canvas.addEventListener('pointercancel',() => dragging = false);

  // Haptics
  function pulseHaptic(ms) {
    if (navigator.vibrate) try { navigator.vibrate(ms); } catch(e) {}
  }

  // Shake detection
  let lastAccel = { x:0, y:0, z:0 }, lastShakeAt = 0;
  function handleMotion(e) {
    const a = e.accelerationIncludingGravity || e.acceleration;
    if (!a) return;
    const dx = (a.x||0) - lastAccel.x, dy = (a.y||0) - lastAccel.y, dz = (a.z||0) - lastAccel.z;
    lastAccel = { x:a.x||0, y:a.y||0, z:a.z||0 };
    const mag = Math.sqrt(dx*dx + dy*dy + dz*dz);
    const now = performance.now();
    if (mag > 25 && now - lastShakeAt > 600) {
      lastShakeAt = now;
      cycleTheme();
    }
  }

  function handleOrient(e) {
    // gamma: left/right tilt [-90..90], beta: front/back [-180..180]
    let g = e.gamma, b = e.beta;
    if (g == null && b == null) return;
    usingMotion = true;
    autopilot = false;
    lastInputAt = performance.now();
    // Clamp & normalize, more sensitive now
    const nx = Math.max(-1, Math.min(1, (g||0) / 35));
    const ny = Math.max(-1, Math.min(1, ((b||0) - 30) / 35));
    tgtX = nx; tgtY = ny;
  }

  function cycleTheme() {
    themeIdx = (themeIdx + 1 + Math.floor(Math.random()*(themes.length-1))) % themes.length;
    theme = themes[themeIdx];
    setCssTheme(theme);
    seedBlobs();
    shakeBoost = 1.2;
    // flash
    flash.style.opacity = '0.9';
    setTimeout(() => flash.style.opacity = '0', 80);
    pulseHaptic([20,40,30]);
    // show HUD briefly
    hud.classList.remove('fade');
    clearTimeout(cycleTheme._t);
    cycleTheme._t = setTimeout(() => hud.classList.add('fade'), 2000);
  }

  // Permission flow
  async function enableMotion() {
    const needOrient = typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
    const needMotion = typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';
    try { if (needOrient) await DeviceOrientationEvent.requestPermission(); } catch(e) {}
    try { if (needMotion) await DeviceMotionEvent.requestPermission();      } catch(e) {}
    window.addEventListener('deviceorientation', handleOrient, true);
    window.addEventListener('devicemotion',      handleMotion, true);
  }

  async function start() {
    gate.style.transition = 'opacity .5s';
    gate.style.opacity = '0';
    setTimeout(() => gate.remove(), 500);
    await enableMotion();
    try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch(e) {}
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}
    pulseHaptic(18);
    // auto fade hud + hint
    setTimeout(() => hud.classList.add('fade'), 2600);
    setTimeout(() => hint.classList.add('fade'), 5000);
    loop();
  }
  startBtn.addEventListener('click', start);

  // Rendering
  function hexToRgb(h) {
    const n = parseInt(h.slice(1), 16);
    return [(n>>16)&255, (n>>8)&255, n&255];
  }
  function rgba(hex, a) {
    const [r,g,b] = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  let t0 = performance.now();
  function loop() {
    const now = performance.now();
    const dt = Math.min(48, now - t0); t0 = now;
    const t = now * 0.001;

    // Autopilot: if no input for 2s, auto-sway so the 3D is visible
    if (now - lastInputAt > 2000) autopilot = true;
    if (autopilot) {
      tgtX = Math.sin(t * 0.35) * 0.85;
      tgtY = Math.cos(t * 0.27) * 0.65;
    }

    // Smooth tilt
    tx += (tgtX - tx) * 0.08;
    ty += (tgtY - ty) * 0.08;
    shakeBoost *= 0.94;

    const cx = W/2, cy = H/2;

    // Background radial gradient, nudged by tilt
    const bg = ctx.createRadialGradient(
      cx - tx*W*0.25, cy - ty*H*0.25, 0,
      cx, cy, Math.hypot(W, H)*0.7
    );
    bg.addColorStop(0, theme.bgB);
    bg.addColorStop(1, theme.bgA);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Nebula blobs (additive)
    ctx.globalCompositeOperation = 'screen';
    for (const bl of blobs) {
      bl.x += bl.vx * dt;
      bl.y += bl.vy * dt;
      if (bl.x < -1.2 || bl.x > 1.2) bl.vx *= -1;
      if (bl.y < -1.2 || bl.y > 1.2) bl.vy *= -1;
      const bx = cx + bl.x * W * 0.6 - tx * W * 0.35;
      const by = cy + bl.y * H * 0.6 - ty * H * 0.35;
      const br = bl.r * Math.max(W, H) * (0.6 + 0.1*Math.sin(t*0.5 + bl.hueShift*6));
      const g = ctx.createRadialGradient(bx, by, 0, bx, by, br);
      g.addColorStop(0, rgba(theme.accent, 0.30));
      g.addColorStop(0.5, rgba(theme.glow, 0.10));
      g.addColorStop(1, rgba(theme.accent, 0));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // Star layers - 3 depths, different parallax
    function drawStars(arr, parallax, baseSize, tw) {
      ctx.fillStyle = theme.stars;
      for (const s of arr) {
        const px = ((s.x + 1) * 0.5 * W) - tx * W * parallax;
        const py = ((s.y + 1) * 0.5 * H) - ty * H * parallax;
        const wrapX = ((px % W) + W) % W;
        const wrapY = ((py % H) + H) % H;
        const flicker = 0.55 + 0.45 * Math.sin(t*2 + s.tw);
        const sz = baseSize * s.s * (tw ? flicker : 1);
        ctx.globalAlpha = 0.6 + 0.4*flicker;
        ctx.beginPath();
        ctx.arc(wrapX, wrapY, sz, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    drawStars(starsFar,  0.08, 0.8, true);
    drawStars(starsMid,  0.22, 1.1, true);
    drawStars(starsNear, 0.55, 1.6, true);

    // Center orb + swirling particles (follows inverse tilt more dramatically)
    const ocx = cx - tx * 80;
    const ocy = cy - ty * 80;
    const orbR = Math.min(W, H) * 0.18 * (1 + shakeBoost*0.25);

    // Outer glow
    const og = ctx.createRadialGradient(ocx, ocy, 0, ocx, ocy, orbR*3.5);
    og.addColorStop(0, rgba(theme.glow, 0.35));
    og.addColorStop(0.4, rgba(theme.accent, 0.12));
    og.addColorStop(1, rgba(theme.accent, 0));
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.arc(ocx, ocy, orbR*3.5, 0, Math.PI*2); ctx.fill();

    // Core
    const core = ctx.createRadialGradient(ocx - orbR*0.2, ocy - orbR*0.25, 0, ocx, ocy, orbR);
    core.addColorStop(0, '#ffffff');
    core.addColorStop(0.4, theme.glow);
    core.addColorStop(1, theme.accent);
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(ocx, ocy, orbR, 0, Math.PI*2); ctx.fill();

    // Orbiting particles
    ctx.globalCompositeOperation = 'screen';
    for (const p of particles) {
      p.a += p.sp * dt * (1 + shakeBoost*2);
      const pr = p.r * (1 + 0.06*Math.sin(t*1.5 + p.tw));
      const px = ocx + Math.cos(p.a) * pr;
      const py = ocy + Math.sin(p.a) * pr * 0.85;
      const g = ctx.createRadialGradient(px, py, 0, px, py, p.size*4);
      g.addColorStop(0, rgba(theme.glow, 0.8));
      g.addColorStop(1, rgba(theme.glow, 0));
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, py, p.size*4, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // Ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.r += 6 + shakeBoost*4;
      r.a *= 0.965;
      if (r.a < 0.02) { ripples.splice(i, 1); continue; }
      ctx.strokeStyle = rgba(theme.glow, r.a);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
      ctx.stroke();
    }

    // Subtle vignette
    const vg = ctx.createRadialGradient(cx, cy, Math.min(W,H)*0.4, cx, cy, Math.max(W,H)*0.8);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(loop);
  }

  // Double-tap to toggle HUD
  let lastTap = 0;
  canvas.addEventListener('click', () => {
    const now = performance.now();
    if (now - lastTap < 320) {
      hud.classList.toggle('fade');
      hint.classList.toggle('fade');
    }
    lastTap = now;
  });

  // If the user never grants motion (desktop etc.), still let them explore via drag
  // and allow a keyboard shortcut / button-less shake via triple tap to cycle theme.
  let tapBurst = [];
  canvas.addEventListener('pointerdown', () => {
    const now = performance.now();
    tapBurst = tapBurst.filter(t => now - t < 700);
    tapBurst.push(now);
    if (tapBurst.length >= 3) { tapBurst = []; cycleTheme(); }
  });
})();
</script>
</body>
</html>
